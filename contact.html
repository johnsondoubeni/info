<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - MyBlog</title>

  <!-- Global + Contact CSS -->
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/contact.css">
</head>

<body>

<!-- HEADER -->
<header>
  <nav>
    <div class="logo">MyBlog</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="info.html">Blog</a></li>
      <li><a href="stories.html">Stories</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>
</header>

<!-- HERO -->
<section class="contact-hero">
  <h1>Get In Touch</h1>
  <p>Have questions, ideas, or want to collaborate?</p>
</section>

<!-- CONTACT SECTION -->
<main class="contact-container">

  <!-- CONTACT FORM -->
  <div class="contact-form">
    <h2>Send a Message</h2>

    <form>
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <textarea placeholder="Your Message..." rows="5" required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </div>

  <!-- CONTACT INFO -->
  <div class="contact-info">
    <h2>Contact Information</h2>
    <p><strong>Email:</strong> your@email.com</p>
    <p><strong>Phone:</strong> +234 xxx xxx xxxx</p>
    <p><strong>Location:</strong> Nigeria</p>
  </div>

</main>

<!-- FOOTER -->
<footer>
  <p>© 2026 MyBlog. All rights reserved.</p>
</footer>

</body>
</html>
